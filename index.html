<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenkins CI/CD Deployment</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
        }

        .container{
            text-align:center;
            background:rgba(255,255,255,0.1);
            padding:40px;
            border-radius:20px;
            backdrop-filter:blur(10px);
            box-shadow:0 8px 20px rgba(0,0,0,0.3);
        }

        h1{
            font-size:3rem;
            margin-bottom:15px;
        }

        p{
            font-size:1.2rem;
            margin-bottom:25px;
        }

        .btn{
            display:inline-block;
            padding:12px 25px;
            background:#ff9800;
            color:white;
            text-decoration:none;
            border-radius:30px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn:hover{
            background:#ffb74d;
            transform:scale(1.05);
        }

        .status{
            margin-top:20px;
            color:#90ee90;
            font-size:18px;
            font-weight:bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 Jenkins CI/CD Pipeline</h1>
        <p>Website Successfully Deployed Using Jenkins, GitHub, Ansible & Apache2</p>

        <a href="#" class="btn">Deployment Successful</a>

        <div class="status">
            ✅ Build Passed | ✅ Deployment Completed
        </div>
    </div>

</body>
</html>
